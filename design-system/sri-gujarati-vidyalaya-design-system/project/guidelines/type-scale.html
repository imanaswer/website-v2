<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Hero → caption, with semantic tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-page); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border: 0; }
  .s { font-family: var(--font-display); color: var(--text-primary); line-height: 1.1; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); flex: none; }
</style>
</head>
<body>
  <div class="r"><span class="s" style="font-size:44px;font-weight:500">Heritage &amp; ambition</span><span class="tok">--text-hero</span></div>
  <div class="r"><span class="s" style="font-size:30px;font-weight:500">Academic excellence</span><span class="tok">--text-section</span></div>
  <div class="r"><span class="s" style="font-size:22px">Why choose Gujarati</span><span class="tok">--text-2xl</span></div>
  <div class="r"><span class="s" style="font-family:var(--font-sans);font-size:16px;color:var(--text-secondary)">Body copy for parents &amp; students</span><span class="tok">--text-base</span></div>
  <div class="r"><span class="s" style="font-family:var(--font-sans);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-brand)">Eyebrow label</span><span class="tok">--text-xs</span></div>
</body>
</html>
