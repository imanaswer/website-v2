<!-- @dsCard group="Colors" viewport="700x176" name="Brand — Maroon" subtitle="Sienna-maroon scale sampled from the 1869 crest" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; letter-spacing: .02em; }
  .lbl { margin-top: 12px; display: flex; gap: 10px; font-family: var(--font-sans); font-size: 12px; color: var(--text-secondary); }
  .lbl b { color: var(--text-primary); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--maroon-900)"><span style="color:#F6E3D5">900</span></div>
    <div class="sw" style="background:var(--maroon-800)"><span style="color:#F6E3D5">800</span></div>
    <div class="sw" style="background:var(--maroon-700)"><span style="color:#F6E3D5">700</span></div>
    <div class="sw" style="background:var(--maroon-500)"><span style="color:#F6E3D5">500</span></div>
    <div class="sw" style="background:var(--maroon-300)"><span style="color:#4F1E0C">300</span></div>
    <div class="sw" style="background:var(--maroon-100)"><span style="color:#7A3414">100</span></div>
  </div>
  <div class="lbl"><b>--brand</b> = maroon-700 · <span>#7A3414</span> · primary actions, headers, links</div>
</body>
</html>
