<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Success, warning, danger, info — muted to suit heritage tone" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .chip { border-radius: var(--radius-md); padding: 12px 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex: none; }
</style>
</head>
<body>
  <div class="grid">
    <div class="chip" style="background:var(--green-100);color:var(--green-600)"><span class="dot" style="background:var(--green-600)"></span>Success</div>
    <div class="chip" style="background:var(--amber-100);color:var(--amber-600)"><span class="dot" style="background:var(--amber-600)"></span>Warning</div>
    <div class="chip" style="background:var(--red-100);color:var(--red-600)"><span class="dot" style="background:var(--red-600)"></span>Danger</div>
    <div class="chip" style="background:var(--blue-100);color:var(--blue-600)"><span class="dot" style="background:var(--blue-600)"></span>Info</div>
  </div>
</body>
</html>
