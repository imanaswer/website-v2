<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-page); font-family: var(--font-sans); }
  .eyebrow { margin-bottom: 12px; }
  p { font-size: 16px; line-height: 1.6; color: var(--text-secondary); max-width: 58ch; }
  .w { display: flex; gap: 22px; margin-top: 16px; }
  .w span { font-size: 15px; color: var(--text-primary); }
  .w b { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); display: block; }
</style>
</head>
<body>
  <div class="eyebrow">Body · Hanken Grotesk</div>
  <p>A Kerala Government recognised, English-medium co-educational school nurturing the total development of every child since 1869.</p>
  <div class="w">
    <span style="font-weight:400">Regular<b>400</b></span>
    <span style="font-weight:500">Medium<b>500</b></span>
    <span style="font-weight:600">Semibold<b>600</b></span>
    <span style="font-weight:700">Bold<b>700</b></span>
  </div>
</body>
</html>
