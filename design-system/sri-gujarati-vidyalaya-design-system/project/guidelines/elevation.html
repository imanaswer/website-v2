<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Warm-tinted soft shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 28px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 26px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-brand)"></div><span class="n">brand</span></div>
  </div>
</body>
</html>
