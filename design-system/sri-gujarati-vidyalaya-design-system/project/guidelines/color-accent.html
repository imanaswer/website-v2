<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; letter-spacing: .02em; }
  .lbl { margin-top: 12px; font-family: var(--font-sans); font-size: 12px; color: var(--text-secondary); }
  .lbl b { color: var(--text-primary); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--gold-800)"><span style="color:#F8F0DC">800</span></div>
    <div class="sw" style="background:var(--gold-700)"><span style="color:#F8F0DC">700</span></div>
    <div class="sw" style="background:var(--gold-500)"><span style="color:#33271B">500</span></div>
    <div class="sw" style="background:var(--gold-400)"><span style="color:#33271B">400</span></div>
    <div class="sw" style="background:var(--gold-300)"><span style="color:#33271B">300</span></div>
    <div class="sw" style="background:var(--gold-100)"><span style="color:#8A661F">100</span></div>
  </div>
  <div class="lbl"><b>--accent</b> = gold-500 · used sparingly: rule lines, eyebrows, awards, focus ring</div>
</body>
</html>
