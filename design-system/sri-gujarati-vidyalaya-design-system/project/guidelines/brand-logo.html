<!-- @dsCard group="Brand" viewport="700x200" name="Logo lockup" subtitle="Primary maroon lockup on parchment; cream on maroon" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; padding: 26px; height: 116px; }
  .panel img { height: 56px; width: auto; }
  .light { background: var(--surface-card); box-shadow: var(--shadow-sm); }
  .dark { background: var(--maroon-900); }
</style>
</head>
<body>
  <div class="panel light"><img src="../assets/logo-lockup.png" alt="SGV logo"></div>
  <div class="panel dark"><img src="../assets/logo-lockup-cream.png" alt="SGV logo reversed"></div>
</body>
</html>
