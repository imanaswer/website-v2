<!-- @dsCard group="Type" viewport="700x230" name="Display — Newsreader" subtitle="Editorial serif for headlines and section titles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-page); }
  .eyebrow { margin-bottom: 10px; }
  .big { font-family: var(--font-display); font-weight: 500; font-size: 56px; line-height: 1.04; letter-spacing: -0.015em; color: var(--text-primary); }
  .big em { font-style: italic; color: var(--text-brand); font-weight: 400; }
  .meta { margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Display · Newsreader</div>
  <div class="big">Knowledge, <em>adorned</em> by humility</div>
  <div class="meta">opsz 6–72 · weights 300 / 400 / 500 / 600 · roman + italic</div>
</body>
</html>
