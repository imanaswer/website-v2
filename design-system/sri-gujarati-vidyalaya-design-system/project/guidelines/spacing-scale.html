<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .bar { background: var(--brand); border-radius: var(--radius-xs); width: 26px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="n">1·4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="n">2·8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="n">3·12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="n">4·16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="n">6·24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="n">8·32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="n">12·48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="n">16·64</span></div>
    <div class="col"><div class="bar" style="height:80px"></div><span class="n">20·80</span></div>
  </div>
</body>
</html>
