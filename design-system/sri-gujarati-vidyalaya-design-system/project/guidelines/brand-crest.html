<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); display: flex; gap: 18px; align-items: center; }
  .panel { flex: 1; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; height: 180px; }
  .panel img { height: 150px; }
  .light { background: var(--surface-card); box-shadow: var(--shadow-sm); }
  .dark { background: var(--maroon-900); }
  .gold { background: var(--maroon-800); }
</style>
</head>
<body>
  <div class="panel light"><img src="../assets/crest.png" alt="crest"></div>
  <div class="panel dark"><img src="../assets/crest-cream.png" alt="crest reversed"></div>
</body>
</html>
