<!-- @dsCard group="Spacing" viewport="700x180" name="Radius" subtitle="Moderate rounding — heritage-modern" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .box { width: 70px; height: 70px; background: var(--surface-card); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm·8</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md·12</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg·16</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl·24</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="n">2xl·32</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="n">pill</span></div>
  </div>
</body>
</html>
